<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang chuyển hướng...</title>
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a14;
      --surface: #13132a;
      --primary: #a78bfa;
      --primary2: #818cf8;
      --accent: #34d399;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
    }
    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── LOADING STATE ── */
    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }
    .spinner {
      width: 56px; height: 56px;
      border: 3px solid rgba(167,139,250,0.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-title { font-size: 1.15rem; font-weight: 700; }
    .loader-sub   { font-size: 0.85rem; color: var(--text2); }

    /* ── ERROR STATE ── */
    .error-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      max-width: 400px;
    }
    .error-icon  { font-size: 3rem; }
    .error-title { font-size: 1.25rem; font-weight: 700; }
    .error-sub   { font-size: 0.875rem; color: var(--text2); line-height: 1.6; }
    .btn-back {
      margin-top: 8px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-back:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(167,139,250,0.4); }

    /* ── IMAGE VIEWER ── */
    .image-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 900px;
      width: 100%;
    }
    .image-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--primary);
      opacity: 0.7;
    }
    .image-title {
      font-size: 1.2rem;
      font-weight: 700;
      max-width: 600px;
      text-align: center;
      word-break: break-word;
    }
    .image-container {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .image-container img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
    }
    .image-meta {
      font-size: 0.8rem;
      color: var(--text3);
    }

    /* ── DISABLED STATE ── */
    .disabled-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }
    .disabled-icon  { font-size: 3rem; }
    .disabled-title { font-size: 1.25rem; font-weight: 700; color: #f87171; }
    .disabled-sub   { font-size: 0.875rem; color: var(--text2); line-height: 1.6; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- LOADING -->
  <div class="loader-wrap" id="loaderWrap">
    <div class="spinner"></div>
    <div class="loader-title">Đang tải nội dung...</div>
    <div class="loader-sub">Vui lòng chờ trong giây lát</div>
  </div>

  <!-- IMAGE VIEWER -->
  <div class="image-wrap" id="imageWrap">
    <div class="image-brand">
      <svg width="18" height="18" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="2" width="10" height="10" rx="2" fill="#a78bfa"/>
        <rect x="16" y="2" width="10" height="10" rx="2" fill="#818cf8"/>
        <rect x="2" y="16" width="10" height="10" rx="2" fill="#818cf8"/>
        <rect x="16" y="16" width="4" height="4" rx="1" fill="#a78bfa"/>
        <rect x="22" y="16" width="4" height="4" rx="1" fill="#a78bfa"/>
        <rect x="16" y="22" width="4" height="4" rx="1" fill="#a78bfa"/>
        <rect x="22" y="22" width="4" height="4" rx="1" fill="#a78bfa"/>
      </svg>
      TạoQR.vn
    </div>
    <div class="image-title" id="imageTitle"></div>
    <div class="image-container">
      <img id="viewImage" src="" alt="QR Content" />
    </div>
    <div class="image-meta" id="imageMeta"></div>
    <a href="index.html" class="btn-back">← Về trang chủ</a>
  </div>

  <!-- DISABLED -->
  <div class="disabled-wrap" id="disabledWrap">
    <div class="disabled-icon">🚫</div>
    <div class="disabled-title">Mã QR đã bị vô hiệu hoá</div>
    <div class="disabled-sub">Mã QR này hiện không còn hoạt động.<br />Vui lòng liên hệ quản trị viên để biết thêm thông tin.</div>
    <a href="index.html" class="btn-back">← Về trang chủ</a>
  </div>

  <!-- ERROR -->
  <div class="error-wrap" id="errorWrap">
    <div class="error-icon">❓</div>
    <div class="error-title">Không tìm thấy QR</div>
    <div class="error-sub" id="errorMsg">Mã QR này không tồn tại hoặc đã bị xóa.</div>
    <a href="index.html" class="btn-back">← Về trang chủ</a>
  </div>

  <script>
    const STORAGE_KEY = 'qr_collection_v2';

    function show(id) {
      document.getElementById('loaderWrap').style.display    = 'none';
      document.getElementById('imageWrap').style.display     = 'none';
      document.getElementById('disabledWrap').style.display  = 'none';
      document.getElementById('errorWrap').style.display     = 'none';
      document.getElementById(id).style.display = 'flex';
    }

    function loadRecord(qrId) {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const list = JSON.parse(raw);
        return list.find(r => r.id === qrId) || null;
      } catch (_) { return null; }
    }

    function run() {
      const params = new URLSearchParams(window.location.search);
      const qrId   = params.get('id');
      const direct = params.get('url'); // direct URL redirect (URL-type QR fallback)

      // ── Direct URL redirect (for URL-type QRs encoded with view.html?url=...) ──
      if (direct) {
        // Immediately replace current page — no confirmation, no back button loop
        window.location.replace(decodeURIComponent(direct));
        return;
      }

      // ── ID-based lookup (for image-type QRs) ──
      if (!qrId) {
        show('errorWrap');
        document.getElementById('errorMsg').textContent = 'Không có mã QR ID trong đường dẫn.';
        return;
      }

      const record = loadRecord(qrId);

      if (!record) {
        show('errorWrap');
        document.getElementById('errorMsg').textContent = 'Mã QR "' + qrId + '" không tồn tại hoặc đã bị xóa.';
        return;
      }

      if (!record.active) {
        show('disabledWrap');
        return;
      }

      // ── URL type: redirect instantly ──
      if (record.type === 'link') {
        window.location.replace(record.data);
        return;
      }

      // ── Image type: show inline ──
      if (record.type === 'image' && record.imageData) {
        document.getElementById('imageTitle').textContent = record.name || 'Hình ảnh';
        document.getElementById('viewImage').src = record.imageData;
        document.getElementById('imageMeta').textContent = 'Tạo lúc: ' + (record.createdAt || '');
        show('imageWrap');
        return;
      }

      show('errorWrap');
      document.getElementById('errorMsg').textContent = 'Nội dung QR không hợp lệ.';
    }

    // Run immediately — no user interaction needed
    run();
  </script>
</body>
</html>
